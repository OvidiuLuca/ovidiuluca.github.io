<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Opsistech</title>

<link href="https://fonts.googleapis.com/css2?family=Instrument+Serif&family=Instrument+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">

<style>
body, html {
  margin: 0;
  padding: 0;
  font-family: "Instrument Sans", sans-serif;
  background: #f2f2f2;
}

/* HEADER */
header {
  position: fixed;
  top: 0;
  width: 100%;
  background: white;
  border-bottom: 1px solid #ddd;
  z-index: 1000;
  overflow-x: auto; /* KEY */
}

/* NAV */
nav {
  display: flex;
  gap: 40px;
  padding: 15px 20px;
  min-width: max-content; /* KEY */
}

/* MENU ITEMS */
nav a {
  text-decoration: none;
  color: black;
  font-size: 12px;
  letter-spacing: 2px;
  text-transform: uppercase;
  font-weight: 500;
  white-space: nowrap;
}

/* HIDE SCROLLBAR (clean look) */
header::-webkit-scrollbar {
  display: none;
}
header {
  -ms-overflow-style: none;
  scrollbar-width: none;
}

/* HERO */
.hero {
  height: 100vh;
  display: flex;
  align-items: center;
  justify-content: center;
}

/* BOX */
.box {
  background: #8f8f8f;
  padding: 60px 30px;
  text-align: center;
  width: 90%;
  max-width: 900px;
}

/* TITLE */
h1 {
  font-family: "Instrument Serif", serif;
  font-size: 48px;
  letter-spacing: 2px;
  color: white;
  margin: 0 0 20px 0;
}

/* SUBTITLE */
p {
  font-family: "Instrument Serif", serif;
  font-size: 18px;
  color: #eaeaea;
  margin: 0;
}

/* DESKTOP CENTERED MENU */
@media (min-width: 768px) {
  header {
    display: flex;
    justify-content: center;
    overflow: hidden;
  }

  nav {
    min-width: auto;
  }
}
</style>
</head>

<body>

<header>
  <nav>
    <a href="#">Home</a>
    <a href="#">About</a>
    <a href="#">Services</a>
    <a href="#">Contact</a>
  </nav>
</header>

<section class="hero">
  <div class="box">
    <h1>OPSISTECH</h1>
    <p>Engineering Vision into Reality</p>
  </div>
</section>

</body>
</html>
